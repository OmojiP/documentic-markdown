    <style>body {
    box-sizing: border-box;

.markdown-body h1,
.markdown-body h2,
.markdown-body h3,
.markdown-body h4,
.markdown-body h5,

    line-height: 1.25;
}

.markdown-body code,
.markdown-body pre {
    font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
}

    overflow: auto;
    color: #1f2328;
    background-color: #eef2f7;
    border: 1px solid #d0d7de;
    border-radius: 6px;
}

    color: #1f2328;
    background-color: #eef2f7;
    border: 1px solid #d0d7de;
    border-radius: 4px;
    padding: 0.12em 0.3em;
}

.markdown-body table {
    border-collapse: collapse;
}

.markdown-body table th,
.markdown-body table td {
    border: 1px solid #d0d7de;
    padding: 6px 13px;
}

.markdown-body blockquote {
    margin: 0;
    padding: 0 1em;
    color: #57606a;
    border-left: 0.25em solid #d0d7de;
}

.mermaid {
    margin: 16px 0;
    text-align: center;
}

.kroki-svg {
    margin: 16px 0;
    text-align: center;
}

.math-block {
    margin: 16px 0;
    text-align: center;
}

.mermaid svg,
.kroki-svg svg {
    display: block;
    width: min(100%, 720px);
    height: auto;
    margin: 0 auto;
}

.math-block svg {
    display: block;
    max-width: 100%;
    height: auto;
    margin: 0 auto;
}

@media print {
    body {
        max-width: none;
    }
}</style>
