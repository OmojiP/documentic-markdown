    <style>body {
    box-sizing: border-box;
    max-width: 980px;
    margin: 0 auto;
    padding: 45px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.5;
    color: #24292f;
}

.markdown-body h1,
.markdown-body h2,
.markdown-body h3,
.markdown-body h4,
.markdown-body h5,
.markdown-body h6 {
    margin-top: 24px;
    margin-bottom: 16px;
    font-weight: 600;
    line-height: 1.25;
}

.markdown-body code,
.markdown-body pre {
    font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace;
}

.markdown-body pre {
    padding: 16px;
    overflow: auto;
    color: #1f2328;
    background-color: #eef2f7;
    border: 1px solid #d0d7de;
    border-radius: 6px;
}

.markdown-body :not(pre)>code {
    color: #1f2328;
    background-color: #eef2f7;
    border: 1px solid #d0d7de;
    border-radius: 4px;
    padding: 0.12em 0.3em;
}

.markdown-body table {
    border-collapse: collapse;
}

.markdown-body table th,
.markdown-body table td {
    border: 1px solid #d0d7de;
    padding: 6px 13px;
}

.markdown-body blockquote {
    margin: 0;
    padding: 0 1em;
    color: #57606a;
    border-left: 0.25em solid #d0d7de;
}

.mermaid {
    margin: 16px 0;
    text-align: center;
}

.kroki-svg {
    margin: 16px 0;
    text-align: center;
}

.math-block {
    margin: 16px 0;
    text-align: center;
}

.mermaid svg,
.kroki-svg svg {
    display: block;
    width: min(100%, 720px);
    height: auto;
    margin: 0 auto;
}

.math-block svg {
    display: block;
    max-width: 100%;
    height: auto;
    margin: 0 auto;
}

@media print {
    body {
        max-width: none;
    }
}</style>
